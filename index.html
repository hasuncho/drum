<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>드럼학원 창업 수익성 분석</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; background: #F1F5F9; color: #0F172A; }

  .header { background: #0F172A; color: #fff; padding: 20px 16px 18px; }
  .header-eyebrow { font-size: 10px; color: #94A3B8; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; }
  .header-title { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 3px; }
  .header-sub { font-size: 12px; color: #94A3B8; }

  .controls { background: #fff; padding: 14px 16px; border-bottom: 1px solid #E2E8F0; }
  .controls-title { font-size: 11px; font-weight: 700; color: #64748B; margin-bottom: 10px; letter-spacing: 0.5px; }
  .control-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .control-row:last-child { margin-bottom: 0; }
  .control-label { font-size: 12px; color: #374151; min-width: 120px; }
  .control-right { display: flex; align-items: center; gap: 8px; }
  input[type=range] { width: 110px; height: 4px; accent-color: #2563EB; }
  .control-val { font-size: 13px; font-weight: 800; color: #0F172A; min-width: 52px; text-align: right; }
  .arpu-badge { background: #EFF6FF; color: #2563EB; font-size: 12px; font-weight: 700; padding: 7px 14px; border-radius: 8px; text-align: center; margin-top: 10px; }

  .tabs { display: flex; background: #fff; border-bottom: 1px solid #E2E8F0; overflow-x: auto; scrollbar-width: none; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { flex: 1; min-width: 72px; padding: 12px 4px; font-size: 11px; font-weight: 500; color: #64748B; background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; white-space: nowrap; text-align: center; }
  .tab.active { color: #2563EB; font-weight: 700; border-bottom-color: #2563EB; }

  .content { padding: 14px 12px 32px; }

  .phase-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; margin-top: 16px; flex-wrap: wrap; }
  .phase-header:first-child { margin-top: 0; }
  .phase-bar { width: 3px; height: 20px; border-radius: 2px; flex-shrink: 0; }
  .phase-title { font-size: 14px; font-weight: 800; }
  .phase-badge { font-size: 10px; color: #64748B; background: #F1F5F9; padding: 3px 8px; border-radius: 12px; white-space: nowrap; }
  .phase-badge2 { font-size: 10px; color: #7C3AED; background: #F5F3FF; padding: 3px 8px; border-radius: 12px; }

  .region-card { background: #fff; border-radius: 14px; border: 1.5px solid #E2E8F0; margin-bottom: 10px; overflow: hidden; position: relative; }
  .region-card.achieved { border-color: var(--rc); }
  .achieved-badge { position: absolute; top: 0; right: 0; background: var(--rc); color: #fff; font-size: 10px; font-weight: 700; padding: 4px 10px; border-radius: 0 12px 0 8px; }
  .card-header { padding: 12px 14px 10px; }
  .card-badge { font-size: 10px; color: #94A3B8; margin-bottom: 2px; }
  .card-title { font-size: 17px; font-weight: 800; }
  .card-sub { font-size: 11px; color: #64748B; margin-top: 1px; }

  .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 0 12px 12px; }
  .metric { background: #F8FAFC; border-radius: 10px; padding: 10px 12px; }
  .metric.green { background: #ECFDF5; }
  .metric.red { background: #FEF2F2; }
  .metric.warn { background: #FFFBEB; }
  .metric-label { font-size: 10px; color: #64748B; margin-bottom: 3px; }
  .metric-val { font-size: 18px; font-weight: 900; color: #0F172A; line-height: 1.1; }
  .metric.green .metric-val { color: #059669; }
  .metric.red .metric-val { color: #DC2626; }
  .metric.warn .metric-val { color: #D97706; }
  .metric-sub { font-size: 10px; color: #94A3B8; margin-top: 2px; }

  .progress-wrap { padding: 0 12px 12px; }
  .progress-header { display: flex; justify-content: space-between; font-size: 10px; color: #94A3B8; margin-bottom: 5px; }
  .progress-track { background: #E2E8F0; border-radius: 4px; height: 7px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 4px; transition: width 0.4s ease; }

  /* 경쟁 분석 탭 */
  .comp-card { background: #fff; border-radius: 14px; border: 1px solid #E2E8F0; margin-bottom: 12px; overflow: hidden; }
  .comp-card-head { padding: 14px 16px 12px; border-bottom: 1px solid #F1F5F9; }
  .comp-card-title { font-size: 15px; font-weight: 800; margin-bottom: 2px; }
  .comp-card-sub { font-size: 11px; color: #64748B; }
  .comp-rank { display: inline-block; font-size: 11px; font-weight: 800; padding: 3px 10px; border-radius: 20px; margin-bottom: 6px; }
  .comp-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 16px; border-bottom: 1px solid #F8FAFC; }
  .comp-row:last-child { border-bottom: none; }
  .comp-label { font-size: 12px; color: #374151; }
  .comp-val { font-size: 12px; font-weight: 700; }
  .comp-bar-row { padding: 8px 16px 12px; }
  .comp-bar-label { font-size: 10px; color: #94A3B8; margin-bottom: 5px; display: flex; justify-content: space-between; }
  .comp-bar-track { background: #E2E8F0; border-radius: 4px; height: 6px; overflow: hidden; margin-bottom: 4px; }
  .comp-bar-fill { height: 100%; border-radius: 4px; }

  /* 경쟁 정보 출처 */
  .source-note { font-size: 10px; color: #94A3B8; padding: 6px 16px 10px; font-style: italic; }

  /* 요약 다크박스 */
  .summary-dark { background: #0F172A; color: #fff; border-radius: 14px; padding: 16px; margin-top: 6px; }
  .summary-dark-title { font-size: 11px; color: #94A3B8; margin-bottom: 10px; }
  .summary-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid #1E293B; }
  .summary-row:last-child { border-bottom: none; }
  .summary-region { font-size: 13px; font-weight: 700; }
  .summary-vals { font-size: 12px; color: #CBD5E1; text-align: right; line-height: 1.7; }

  /* 학생수 테이블 */
  .student-table { background: #fff; border-radius: 14px; overflow: hidden; border: 1px solid #E2E8F0; margin-bottom: 14px; }
  .student-table-header { padding: 12px 14px 8px; }
  .student-table-title { font-size: 14px; font-weight: 800; }
  .student-table-sub { font-size: 11px; color: #64748B; margin-top: 1px; }
  .tbl-head { display: grid; grid-template-columns: 52px 1fr 1fr 52px; padding: 8px 12px 6px; border-bottom: 1px solid #F1F5F9; }
  .tbl-head span { font-size: 10px; color: #94A3B8; font-weight: 700; text-align: right; }
  .tbl-head span:first-child { text-align: left; }
  .tbl-row { display: grid; grid-template-columns: 52px 1fr 1fr 52px; padding: 9px 12px; border-bottom: 1px solid #F8FAFC; align-items: center; }
  .tbl-row.p1 { background: #EFF6FF; border-left: 3px solid #2563EB; }
  .tbl-row.p2 { background: #F5F3FF; border-left: 3px solid #7C3AED; }
  .tbl-row:not(.p1):not(.p2) { border-left: 3px solid transparent; }
  .tbl-cell { font-size: 12px; color: #374151; text-align: right; }
  .tbl-cell:first-child { text-align: left; font-weight: 600; display: flex; align-items: center; gap: 4px; }
  .tbl-chip { font-size: 8px; background: #2563EB; color: #fff; border-radius: 3px; padding: 1px 4px; }
  .tbl-chip.p2c { background: #7C3AED; }
  .profit-800 { color: #059669 !important; font-weight: 800; }
  .profit-450 { color: #2563EB !important; font-weight: 800; }
  .profit-neg { color: #DC2626 !important; }

  /* 운영비 */
  .cost-card { background: #fff; border-radius: 14px; overflow: hidden; border: 1px solid #E2E8F0; margin-bottom: 14px; }
  .cost-card-header { padding: 13px 14px 11px; color: #fff; }
  .cost-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; border-bottom: 1px solid #F8FAFC; }
  .cost-item-left { font-size: 12px; color: #374151; }
  .cost-item-right { display: flex; align-items: center; gap: 8px; }
  .cost-bar-wrap { width: 50px; height: 4px; background: #F1F5F9; border-radius: 2px; }
  .cost-bar-fill2 { height: 100%; border-radius: 2px; opacity: 0.6; }
  .cost-item-val { font-size: 13px; font-weight: 700; color: #0F172A; min-width: 36px; text-align: right; }
  .cost-total { display: flex; justify-content: space-between; padding: 12px 14px; background: #F8FAFC; }
  .cost-total-label { font-size: 13px; font-weight: 700; }
  .cost-total-val { font-size: 16px; font-weight: 900; }

  .compare-card { background: #fff; border-radius: 14px; padding: 14px; border: 1px solid #E2E8F0; margin-bottom: 14px; }
  .compare-title { font-size: 13px; font-weight: 700; margin-bottom: 12px; }
  .compare-row { padding: 8px 0; border-bottom: 1px solid #F1F5F9; }
  .compare-row:last-child { border-bottom: none; }
  .compare-row-label { font-size: 11px; color: #64748B; margin-bottom: 6px; }
  .compare-vals { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }
  .compare-val-item { text-align: center; padding: 6px 2px; background: #F8FAFC; border-radius: 8px; }
  .compare-val-region { font-size: 9px; font-weight: 700; margin-bottom: 3px; }
  .compare-val-num { font-size: 12px; font-weight: 800; }
</style>
</head>
<body>

<div class="header">
  <div class="header-eyebrow">Drum Academy · Startup Analysis</div>
  <div class="header-title">드럼학원 창업 수익성 분석</div>
  <div class="header-sub">2028~29년 창업 기준 · 노원 월계 · 위례 · 구리 · 고덕/상일동 · 다산</div>
</div>

<div class="controls">
  <div class="controls-title">수강료 설정</div>
  <div style="font-size:10px;color:#94A3B8;margin-bottom:6px;margin-top:-4px">슬라이더를 움직이면 전체 수치가 실시간으로 바뀌어요</div>
  <div class="control-row">
    <span class="control-label">취미반 (40분)</span>
    <div class="control-right">
      <input type="range" id="hobby" min="100000" max="300000" step="5000" value="160000">
      <span class="control-val" id="hobby-val">16만원</span>
    </div>
  </div>
  <div class="control-row">
    <span class="control-label">전문반 (1시간)</span>
    <div class="control-right">
      <input type="range" id="pro" min="150000" max="400000" step="5000" value="220000">
      <span class="control-val" id="pro-val">22만원</span>
    </div>
  </div>
  <div class="control-row">
    <span class="control-label">취미반 비율</span>
    <div class="control-right">
      <input type="range" id="ratio" min="30" max="80" step="5" value="85">
      <span class="control-val" id="ratio-val">85%</span>
    </div>
  </div>
  <div class="arpu-badge" id="arpu-badge">평균 ARPU 17만원</div>
  <div style="height:1px;background:#F1F5F9;margin:12px 0"></div>
  <div class="controls-title" style="margin-bottom:8px">목표 학생 수</div>
  <div class="control-row">
    <span class="control-label">Phase 1 기준 (1인)</span>
    <div class="control-right">
      <input type="range" id="s1" min="30" max="65" step="1" value="50">
      <span class="control-val" id="s1-val">50명</span>
    </div>
  </div>
  <div class="control-row">
    <span class="control-label">Phase 2 기준 (강사포함)</span>
    <div class="control-right">
      <input type="range" id="s2" min="45" max="90" step="1" value="75">
      <span class="control-val" id="s2-val">75명</span>
    </div>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('summary',this)">📊 단계별 요약</button>
  <button class="tab" onclick="switchTab('compete',this)">🗺️ 경쟁 분석</button>
  <button class="tab" onclick="switchTab('detail',this)">🔢 학생수 시뮬</button>
  <button class="tab" onclick="switchTab('cost',this)">💰 운영비</button>
</div>

<div class="content" id="content-summary"><div id="phases-container"></div></div>
<div class="content" id="content-compete" style="display:none"><div id="compete-container"></div></div>
<div class="content" id="content-detail" style="display:none"><div id="detail-container"></div></div>
<div class="content" id="content-cost" style="display:none"><div id="cost-container"></div></div>

<script>
const REGIONS = [
  {
    id:"nowon", name:"노원 월계", badge:"서울 노원구 월계동", fixed:4200000, color:"#0891B2",
    rent: 160, competition: 2, compDetail:"초이스 드럼 스쿨, 라라실용음악학원 (서울원 단지 내 공백)",
    income:"높음↑", noise:"낮음", target:"성인 직장인 (GTX 유입)", premium:true,
    rank:1, rankLabel:"🥇 1순위", rankBg:"#ECFEFF", rankColor:"#0891B2",
    horea: true, horeaTxt:"2028.7 서울원 3,032세대 + GTX-C 개통",
    verdict:"2028년 입주·GTX 타이밍 최적. 현재 경쟁 1~2개 공백. 지금 선점 시 임대료 저렴. 입주 후 임대료 급등 전 장기계약 필수. 성인 직장인 취미 수요 급성장 예상."
  },
  {
    id:"wirye", name:"위례", badge:"서울 송파/경기 성남", fixed:5000000, color:"#2563EB",
    rent: 200, competition: 6, compDetail:"엘스드럼, 뉴욕드럼, 톤드럼스튜디오, 제이툰실용음악 + 신규 진입 예상 2개",
    income:"높음", noise:"낮음", target:"성인 직장인·신혼부부", premium:true,
    rank:2, rankLabel:"🥈 2순위", rankBg:"#EFF6FF", rankColor:"#2563EB",
    horea: true, horeaTxt:"위례신사선 착공 (개통 2031~32 예정)",
    verdict:"2028~29년엔 상권 더 성숙하나 경쟁도 현재 4개→6개 예상. 위례신사선은 2031~32년 개통으로 혜택은 그 이후. 임대료도 현재 대비 상승. 성인 취미 수요는 여전히 탄탄."
  },
  {
    id:"guri", name:"구리 인창동", badge:"경기 구리시", fixed:4000000, color:"#7C3AED",
    rent: 130, competition: 4, compDetail:"드럼스튜디오, 룩스뮤직드럼학원, 아트스퀘어실용음악 + 신규 1개 예상",
    income:"중간", noise:"낮음", target:"혼합 (성인+학생)", premium:false,
    rank:3, rankLabel:"🥉 3순위", rankBg:"#F5F3FF", rankColor:"#7C3AED",
    horea: false, horeaTxt:"",
    verdict:"2028~29년에도 큰 변화 없이 안정적. 임대료 소폭 상승 예상. 인구 증가 제한적이라 수요 파이가 작아 60명 확장에 한계. 리스크 낮고 안정적인 차선책."
  },
  {
    id:"godeok", name:"고덕/상일동", badge:"서울 강동구", fixed:5200000, color:"#EA580C",
    rent: 220, competition: 3, compDetail:"닥터호라엔 모모 드럼교습소 + 신규 2개 입점 예상 (대단지 완성 후)",
    income:"높음", noise:"높음", target:"초중학생 위주", premium:true,
    rank:4, rankLabel:"4순위", rankBg:"#FFF7ED", rankColor:"#EA580C",
    horea: false, horeaTxt:"",
    verdict:"2028~29년엔 단지 완성으로 경쟁자도 늘어날 가능성. 학군지 소음 민감도 여전. 임대료도 서울 신축 프리미엄으로 높은 수준 유지. 성인 취미 수요 기대하기 어려운 구조."
  },
  {
    id:"dasan", name:"다산신도시", badge:"경기 남양주", fixed:3800000, color:"#64748B",
    rent: 110, competition: 10, compDetail:"현재 7개 + 2028~29년 신규 진입 3개 이상 예상",
    income:"중간", noise:"낮음", target:"젊은 가족", premium:false,
    rank:5, rankLabel:"❌ 비추천", rankBg:"#F8FAFC", rankColor:"#64748B",
    horea: false, horeaTxt:"",
    verdict:"2028~29년엔 현재 7개에서 10개 이상으로 경쟁 더 심화 예상. 신도시 성장으로 신규 학원 진입 계속. 수강료 프리미엄 어렵고 가격 경쟁만 심해질 구조."
  },
];

const VAR = 0.02;
const INST = 2000000;

function arpu() {
  const h = +document.getElementById("hobby").value;
  const p = +document.getElementById("pro").value;
  const r = +document.getElementById("ratio").value / 100;
  return h * r + p * (1 - r);
}
function profit(s, a, f) { return s * a * (1 - VAR) - f; }
function needStudents(target, a, f) {
  for (let s = 1; s <= 120; s++) if (profit(s,a,f) >= target) return s;
  return 999;
}
function fmt(n) {
  const v = Math.round(n/10000);
  return n < 0 ? `(${Math.abs(v)}만)` : `${v}만`;
}
function pct(n, t) { return Math.min(100, Math.max(0, Math.round((n/t)*100))); }

// ── SUMMARY ──────────────────────────────────────────
function renderSummary() {
  const a = arpu();
  const s1 = +document.getElementById("s1").value;
  const s2 = +document.getElementById("s2").value;
  const phases = [
    { label:"Phase 1 · 1인 운영", target:4500000, students:s1, color:"#2563EB", instructor:false },
    { label:"Phase 2 · 강사 추가", target:8000000, students:s2, color:"#7C3AED", instructor:true },
  ];
  let html = "";
  phases.forEach(ph => {
    html += `<div class="phase-header">
      <div class="phase-bar" style="background:${ph.color}"></div>
      <div class="phase-title">${ph.label}</div>
      <div class="phase-badge">목표 ${Math.round(ph.target/10000)}만 / ${ph.students}명 기준</div>
      ${ph.instructor?`<div class="phase-badge2">강사비 +200만</div>`:""}
    </div>`;

    REGIONS.forEach(r => {
      const f = ph.instructor ? r.fixed + INST : r.fixed;
      const p = profit(ph.students, a, f);
      const need = needStudents(ph.target, a, f);
      const achieved = p >= ph.target;
      const bep = Math.ceil(f / (a*(1-VAR)));
      const pctVal = pct(p, ph.target);
      const fillColor = achieved ? r.color : p > 0 ? "#F59E0B" : "#EF4444";

      html += `<div class="region-card ${achieved?"achieved":""}" style="--rc:${r.color}">
        ${achieved?`<div class="achieved-badge">달성 ✓</div>`:""}
        <div class="card-header">
          <div class="comp-rank" style="background:${r.rankBg};color:${r.rankColor}">${r.rankLabel}</div>
          ${r.horea ? `<div style="background:#FEF9C3;color:#854D0E;font-size:10px;font-weight:700;padding:3px 10px;border-radius:12px;display:inline-block;margin-bottom:4px">🚀 ${r.horeaTxt}</div>` : ""}
          <div class="card-badge">${r.badge}</div>
          <div class="card-title">${r.name}</div>
          <div class="card-sub">월 고정비 ${Math.round(f/10000)}만원 · 경쟁 ${r.competition}개</div>
        </div>
        <div class="metrics">
          <div class="metric">
            <div class="metric-label">월 운영비</div>
            <div class="metric-val">${Math.round(f/10000)}만</div>
            <div class="metric-sub">${ph.instructor?"강사비 포함":""}</div>
          </div>
          <div class="metric">
            <div class="metric-label">손익분기점</div>
            <div class="metric-val">${bep}명</div>
            <div class="metric-sub">BEP</div>
          </div>
          <div class="metric ${p>=ph.target?"green":p>=0?"":"red"}">
            <div class="metric-label">${ph.students}명 순이익</div>
            <div class="metric-val">${fmt(p)}</div>
          </div>
          <div class="metric ${achieved?"green":need<=ph.students+8?"warn":""}">
            <div class="metric-label">목표 필요 학생</div>
            <div class="metric-val">${need<=99?need+"명":"불가"}</div>
            <div class="metric-sub">${achieved?"달성":need-ph.students>0?`+${need-ph.students}명`:""}</div>
          </div>
        </div>
        <div class="progress-wrap">
          <div class="progress-header"><span>목표 달성률</span><span>${pctVal}%</span></div>
          <div class="progress-track"><div class="progress-fill" style="width:${pctVal}%;background:${fillColor}"></div></div>
        </div>
      </div>`;
    });
  });

  // 요약
  html += `<div class="summary-dark"><div class="summary-dark-title">💡 현재 수강료 기준 종합</div>`;
  REGIONS.forEach(r => {
    const p1 = profit(45, a, r.fixed);
    const p2 = profit(60, a, r.fixed+INST);
    const colors = {wirye:"#93C5FD",guri:"#C4B5FD",godeok:"#FED7AA",dasan:"#CBD5E1"};
    html += `<div class="summary-row">
      <div class="summary-region" style="color:${colors[r.id]}">${r.name}</div>
      <div class="summary-vals">P1 ${p1>=4500000?"✅":"⚠️"} ${fmt(p1)}<br>P2 ${p2>=8000000?"✅":"⚠️"} ${fmt(p2)}</div>
    </div>`;
  });
  html += `</div>`;
  document.getElementById("phases-container").innerHTML = html;
}

// ── 경쟁 분석 ──────────────────────────────────────────
function renderCompete() {
  const factors = [
    { key:"competition", label:"드럼 수강처 수", unit:"개", vals:[4,3,1,7], bars:[4,3,1,7], maxBar:7, lowerBetter:true },
    { key:"rent", label:"임대료 추정 (월)", unit:"만원", vals:[180,120,200,100], bars:[180,120,200,100], maxBar:200, lowerBetter:true },
    { key:"income", label:"주민 소득 수준", unit:"", vals:["높음","중간","높음","중간"], isBadge:true },
    { key:"noise", label:"소음 민감도", unit:"", vals:["낮음","낮음","높음","낮음"], isBadge:true, warnHighVal:"높음" },
    { key:"target", label:"주요 타깃", unit:"", vals:["성인·신혼","혼합","초중학생","젊은가족"], isBadge:true },
    { key:"premium", label:"수강료 프리미엄", unit:"", vals:["가능✅","보통","가능✅","어려움❌"], isBadge:true },
  ];

  let html = "";
  REGIONS.forEach(r => {
    html += `<div class="comp-card">
      <div class="comp-card-head">
        <div class="comp-rank" style="background:${r.rankBg};color:${r.rankColor}">${r.rankLabel}</div>
        <div class="comp-card-title">${r.name}</div>
        <div class="comp-card-sub">${r.badge}</div>
      </div>`;

    // 경쟁 학원 목록
    html += `<div class="comp-row">
      <div class="comp-label">📍 확인된 드럼 수강처</div>
      <div class="comp-val" style="color:${r.competition>=5?"#DC2626":r.competition<=2?"#059669":"#D97706"}">${r.competition}개</div>
    </div>
    <div style="padding:4px 16px 10px;font-size:11px;color:#64748B;line-height:1.6">${r.compDetail}</div>
    <div class="source-note">※ 네이버 지도 직접 검색 기준 (2026.06)</div>`;

    // 경쟁 바
    html += `<div class="comp-bar-row">
      <div class="comp-bar-label"><span>경쟁 강도</span><span>${r.competition}개</span></div>
      <div class="comp-bar-track"><div class="comp-bar-fill" style="width:${(r.competition/8)*100}%;background:${r.competition>=5?"#EF4444":r.competition<=2?"#10B981":"#F59E0B"}"></div></div>
    </div>`;

    // 주요 특성
    const rows = [
      ["💰 임대료 (20평 2층)", `월 ${r.rent}만원 추정`],
      ["👥 주요 타깃", r.target],
      ["📢 소음 민감도", r.noise],
      ["💳 수강료 프리미엄", r.premium?"가능":"제한적"],
    ];
    rows.forEach(([label, val]) => {
      const isWarn = (val === "높음" && label.includes("소음")) || val === "제한적";
      const isGood = (val === "낮음" && label.includes("소음")) || val === "가능";
      html += `<div class="comp-row">
        <div class="comp-label">${label}</div>
        <div class="comp-val" style="color:${isWarn?"#DC2626":isGood?"#059669":"#374151"}">${val}</div>
      </div>`;
    });

    // 종합 의견
    html += `<div style="padding:10px 16px 14px;background:#F8FAFC;margin:0">
      <div style="font-size:10px;color:#94A3B8;margin-bottom:4px">종합 의견</div>
      <div style="font-size:12px;color:#374151;line-height:1.6">${r.verdict}</div>
    </div></div>`;
  });

  document.getElementById("compete-container").innerHTML = html;
}

// ── DETAIL ──────────────────────────────────────────
function renderDetail() {
  const a = arpu();
  let html = "";
  REGIONS.forEach(r => {
    html += `<div class="student-table">
      <div class="student-table-header" style="border-left:4px solid ${r.color};padding-left:12px">
        <div class="student-table-title">${r.name}</div>
        <div class="student-table-sub">${r.badge} · 월 고정비 ${Math.round(r.fixed/10000)}만원</div>
      </div>
      <div class="tbl-head"><span>학생수</span><span>월매출</span><span>순이익</span><span>달성</span></div>`;

    [30,35,40,45,50,55,60,65,70].forEach(s => {
      const rev = s * a;
      const p = profit(s, a, r.fixed);
      const isP1 = s===45, isP2 = s===60;
      const cls = isP1?"p1":isP2?"p2":"";
      const pClass = p>=8000000?"profit-800":p>=4500000?"profit-450":p<0?"profit-neg":"";
      const lbl = p>=8000000?"800✓":p>=4500000?"450✓":`${pct(p,8000000)}%`;
      html += `<div class="tbl-row ${cls}">
        <div class="tbl-cell">${s}명${isP1?`<span class="tbl-chip">P1</span>`:""}${isP2?`<span class="tbl-chip p2c">P2</span>`:""}</div>
        <div class="tbl-cell">${Math.round(rev/10000)}만</div>
        <div class="tbl-cell ${pClass}">${fmt(p)}</div>
        <div class="tbl-cell" style="font-size:11px;font-weight:700;color:${p>=8000000?"#059669":p>=4500000?"#2563EB":"#94A3B8"}">${lbl}</div>
      </div>`;
    });
    html += `</div>`;
  });
  document.getElementById("detail-container").innerHTML = html;
}

// ── COST ──────────────────────────────────────────
function renderCost() {
  const costData = {
    nowon:  [["임대료 (2층 20평, 선점 기준)",1600000],["관리비/공과금",200000],["마케팅비",500000],["소모품비",200000],["기타운영비",200000],["원장 인건비",1500000]],
    wirye:  [["임대료 (2층 20평)",2000000],["관리비/공과금",300000],["마케팅비",500000],["소모품비",200000],["기타운영비",200000],["원장 인건비",1800000]],
    guri:   [["임대료 (2층 20평)",1300000],["관리비/공과금",200000],["마케팅비",500000],["소모품비",200000],["기타운영비",200000],["원장 인건비",1600000]],
    godeok: [["임대료 (2층 20평)",2200000],["관리비/공과금",300000],["마케팅비",500000],["소모품비",200000],["기타운영비",200000],["원장 인건비",1800000]],
    dasan:  [["임대료 (2층 20평)",1100000],["관리비/공과금",180000],["마케팅비",500000],["소모품비",200000],["기타운영비",200000],["원장 인건비",1620000]],
  };
  const a = arpu();
  let html = "";
  REGIONS.forEach(r => {
    const items = costData[r.id];
    const total = items.reduce((s,[,v])=>s+v,0);
    html += `<div class="cost-card">
      <div class="cost-card-header" style="background:${r.color}">
        <div style="font-size:10px;opacity:0.8;margin-bottom:2px">${r.badge}</div>
        <div style="font-size:16px;font-weight:800">${r.name}</div>
      </div>`;
    items.forEach(([label,amt])=>{
      const bw = Math.round((amt/total)*100);
      html += `<div class="cost-item">
        <div class="cost-item-left">${label}</div>
        <div class="cost-item-right">
          <div class="cost-bar-wrap"><div class="cost-bar-fill2" style="width:${bw}%;height:100%;background:${r.color};border-radius:2px"></div></div>
          <div class="cost-item-val">${Math.round(amt/10000)}만</div>
        </div>
      </div>`;
    });
    html += `<div class="cost-total"><span class="cost-total-label">월 합계</span><span class="cost-total-val" style="color:${r.color}">${Math.round(total/10000)}만원</span></div></div>`;
  });

  // 비교표
  html += `<div class="compare-card"><div class="compare-title">📊 지역별 핵심 수치 비교</div>`;
  const rows2 = [
    { label:"월 임대료", vals: REGIONS.map(r=>r.rent+"만") },
    { label:"경쟁 학원 수", vals: REGIONS.map(r=>r.competition+"개") },
    { label:"45명 순이익", vals: REGIONS.map(r=>fmt(profit(45,a,r.fixed))) },
    { label:"P1 필요 학생", vals: REGIONS.map(r=>needStudents(4500000,a,r.fixed)+"명") },
    { label:"P2 필요 학생", vals: REGIONS.map(r=>needStudents(8000000,a,r.fixed+INST)+"명") },
  ];
  rows2.forEach(row=>{
    html += `<div class="compare-row">
      <div class="compare-row-label">${row.label}</div>
      <div class="compare-vals">`;
    REGIONS.forEach((r,i)=>{
      html += `<div class="compare-val-item">
        <div class="compare-val-region" style="color:${r.color}">${r.name.replace("/상일동","")}</div>
        <div class="compare-val-num">${row.vals[i]}</div>
      </div>`;
    });
    html += `</div></div>`;
  });
  html += `</div>`;
  document.getElementById("cost-container").innerHTML = html;
}

function updateControls() {
  const h = +document.getElementById("hobby").value;
  const p = +document.getElementById("pro").value;
  const r = +document.getElementById("ratio").value;
  const s1 = +document.getElementById("s1").value;
  const s2 = +document.getElementById("s2").value;
  document.getElementById("hobby-val").textContent = `${Math.round(h/10000)}만원`;
  document.getElementById("pro-val").textContent   = `${Math.round(p/10000)}만원`;
  document.getElementById("ratio-val").textContent = `${r}%`;
  document.getElementById("s1-val").textContent    = `${s1}명`;
  document.getElementById("s2-val").textContent    = `${s2}명`;
  document.getElementById("arpu-badge").textContent = `평균 ARPU ${Math.round(arpu()/10000)}만원`;
  renderAll();
}

function renderAll() {
  renderSummary(); renderCompete(); renderDetail(); renderCost();
}

["hobby","pro","ratio","s1","s2"].forEach(id => {
  document.getElementById(id).addEventListener("input", updateControls);
});

function switchTab(tab, btn) {
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  btn.classList.add("active");
  ["summary","compete","detail","cost"].forEach(t=>{
    document.getElementById("content-"+t).style.display = t===tab?"block":"none";
  });
}

renderAll();
</script>
</body>
</html>
